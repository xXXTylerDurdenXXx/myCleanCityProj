server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /Resources/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Прокси на бэкенд на хосте (без CORS)
    location /api/ {
        proxy_pass http://host.docker.internal:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /supportChat {
        proxy_pass http://host.docker.internal:5000/supportChat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Файлы с бэкенда (аватары, фото точек и отчётов)
    location /uploads/ {
        proxy_pass http://host.docker.internal:5000/uploads/;
        proxy_set_header Host $host;
    }
}
