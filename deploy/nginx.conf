# Фронтенд «Чистый город» на 89.108.66.220
# Скопировать: sudo cp deploy/nginx.conf /etc/nginx/sites-available/mycleancity
# Активировать: sudo ln -sf /etc/nginx/sites-available/mycleancity /etc/nginx/sites-enabled/
# Проверить: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 89.108.66.220;

    root /var/www/mycleancity;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA — все маршруты React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики Vite
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /Resources/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Опционально: прокси на бэкенд (один origin, без CORS) ---
    # Раскомментируйте и в .env.production укажите:
    #   VITE_API_URL=/api
    #   VITE_API_ORIGIN=
    #   VITE_SIGNALR_URL=/supportChat
