# Фронтенд «Чистый город» — системный nginx (без Docker)
# Проксирует API и статику на бэкенд :5000

server {
    listen 80;
    server_name 89.108.66.220;

    root /var/www/mycleancity;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /Resources/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /supportChat {
        proxy_pass http://127.0.0.1:5000/supportChat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /reports/ {
        proxy_pass http://127.0.0.1:5000/reports/;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
        proxy_set_header Host $host;
    }

    location /avatars/ {
        proxy_pass http://127.0.0.1:5000/avatars/;
        proxy_set_header Host $host;
    }
}
